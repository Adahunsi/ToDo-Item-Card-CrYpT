<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todo Card</title>
    <link rel="stylesheet" href="style.css">
    <script defer src="script.js"></script>
</head>

<body>

    <!-- ═══════════════════════════════
         TODO CARD
    ════════════════════════════════ -->
    <article
      class="todo-card"
      data-testid="test-todo-card"
      aria-label="Todo task card"
    >
 
      <!-- Header: checkbox + title + action buttons -->
      <div class="card-header">
        <div class="card-header-left">
 
          <!-- Checkbox toggle -->
          <label
            class="todo-checkbox-label"
            aria-label="Mark task as complete"
          >
            <input
              type="checkbox"
              class="todo-checkbox"
              data-testid="test-todo-complete-toggle"
              aria-label="Mark task as complete"
            />
          </label>
 
          <!-- Task title -->
          <h2
            class="todo-title"
            data-testid="test-todo-title"
          >
            Run a campaign for Jumia Storefront
          </h2>
 
        </div>
      </div>
 
      <!-- Priority + Status badges -->
      <div class="badges-row">
        <span
          class="badge badge-priority-high"
          data-testid="test-todo-priority"
          aria-label="Priority: High"
        >
          High
        </span>
 
        <span
          class="badge badge-status"
          data-testid="test-todo-status"
          aria-label="Status: In Progress"
        >
          In Progress
        </span>
      </div>
 
      <!-- Task description -->
      <p
        class="todo-description"
        data-testid="test-todo-description"
      >
        Launch a targeted marketing campaign for the Jumia Storefront.
        Focus on increasing brand awareness and driving sales.
      </p>
 
      <!-- Due date + time remaining -->
      <div class="meta-row">
        <span class="meta-item">
          
          <time
            data-testid="test-todo-due-date"
            datetime="2026-05-01T18:00:00Z"
          >
            Due May 1, 2026
          </time>
        </span>
 
        <span
          class="meta-item"
          data-testid="test-todo-time-remaining"
          aria-live="polite"
          aria-label="Time remaining"
        >
          <!-- Filled in by JS -->
        </span>
      </div>
 
      <!-- Tags -->
      <ul
        class="tags-list"
        data-testid="test-todo-tags"
        role="list"
        aria-label="Task tags"
      >
        <li
          class="tag"
          data-testid="test-todo-tag-work"
        >
          work
        </li>
        <li
          class="tag"
          data-testid="test-todo-tag-urgent"
        >
          urgent
        </li>
        <li class="tag">design</li>
      </ul>
 
      <!-- Edit + Delete buttons -->
      <div class="card-actions">
        <button
          class="btn btn-edit"
          data-testid="test-todo-edit-button"
          aria-label="Edit task"
          onclick="handleEdit()"
        >
          Edit
        </button>
 
        <button
          class="btn btn-delete"
          data-testid="test-todo-delete-button"
          aria-label="Delete task"
          onclick="handleDelete()"
        >
          Delete
        </button>
      </div>
 
    </article>

</body>

</html>
