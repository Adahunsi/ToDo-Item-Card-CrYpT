<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todo Card</title>
    <link rel="stylesheet" href="style.css">
    <script defer src="script.js"></script>
</head>

<body>
    <article
      class="todo-card"
      data-testid="test-todo-card"
      aria-label="Todo task card"
    >

      <!-- Priority indicator accent (visual only) -->
      <div
        class="priority-indicator priority-high"
        data-testid="test-todo-priority-indicator"
        aria-hidden="true"
      ></div>

      <!-- Header: checkbox + title + action buttons -->
      <div class="card-header">
        <div class="card-header-left">

          <label
            class="todo-checkbox-label"
            aria-label="Mark task as complete"
          >
            <input
              type="checkbox"
              class="todo-checkbox"
              data-testid="test-todo-complete-toggle"
              aria-label="Mark task as complete"
            />
          </label>

          <h2
            class="todo-title"
            data-testid="test-todo-title"
          >
            Run a campaign for Jumia Storefront
          </h2>

        </div>
      </div>

      <!-- Badges row: priority badge + status control -->
      <div class="badges-row">
        <span
          class="badge badge-priority-high"
          data-testid="test-todo-priority"
          aria-label="Priority: High"
        >
          High
        </span>

        <!-- Stage 0 status display (kept for testid compliance) -->
        <span
          class="badge badge-status"
          data-testid="test-todo-status"
          aria-label="Status: In Progress"
        >
          In Progress
        </span>

        <!-- Stage 1: interactive status control -->
        <label for="status-control" class="sr-only">Task status</label>
        <select
          id="status-control"
          class="status-control"
          data-testid="test-todo-status-control"
          aria-label="Task status"
        >
          <option value="pending">Pending</option>
          <option value="in-progress" selected>In Progress</option>
          <option value="done">Done</option>
        </select>
      </div>

      <!-- Expand / collapse toggle (shown by JS if description is long) -->
      <button
        class="expand-toggle"
        data-testid="test-todo-expand-toggle"
        aria-expanded="false"
        aria-controls="collapsible-section"
        aria-label="Show full description"
        hidden
      >
        Show more
      </button>

      <!-- Collapsible description section -->
      <div
        id="collapsible-section"
        class="collapsible-section"
        data-testid="test-todo-collapsible-section"
      >
        <p
          class="todo-description"
          data-testid="test-todo-description"
        >
          Launch a targeted marketing campaign for the Jumia Storefront.
          Focus on increasing brand awareness and driving sales.
        </p>
      </div>

      <!-- Due date + time remaining + overdue indicator -->
      <div class="meta-row">
        <span class="meta-item">
          <time
            data-testid="test-todo-due-date"
            datetime="2026-05-01T18:00:00Z"
          >
            Due May 1, 2026
          </time>
        </span>

        <span
          class="meta-item"
          data-testid="test-todo-time-remaining"
          aria-live="polite"
          aria-label="Time remaining"
        >
        </span>

        <!-- Stage 1: overdue indicator -->
        <span
          class="overdue-indicator"
          data-testid="test-todo-overdue-indicator"
          aria-live="polite"
          hidden
        >
          Overdue
        </span>
      </div>

      <!-- Tags -->
      <ul
        class="tags-list"
        data-testid="test-todo-tags"
        role="list"
        aria-label="Task tags"
      >
        <li class="tag" data-testid="test-todo-tag-work">work</li>
        <li class="tag" data-testid="test-todo-tag-urgent">urgent</li>
        <li class="tag">design</li>
      </ul>

      <!-- Edit + Delete buttons -->
      <div class="card-actions">
        <button
          class="btn btn-edit"
          data-testid="test-todo-edit-button"
          aria-label="Edit task"
        >
          Edit
        </button>

        <button
          class="btn btn-delete"
          data-testid="test-todo-delete-button"
          aria-label="Delete task"
        >
          Delete
        </button>
      </div>

      <!-- Stage 1: Edit form (hidden until Edit is clicked) -->
      <form
        class="edit-form"
        data-testid="test-todo-edit-form"
        novalidate
        hidden
      >
        <label for="edit-title">Title</label>
        <input
          type="text"
          id="edit-title"
          class="edit-input"
          data-testid="test-todo-edit-title-input"
          value="Run a campaign for Jumia Storefront"
        />

        <label for="edit-description">Description</label>
        <textarea
          id="edit-description"
          class="edit-textarea"
          data-testid="test-todo-edit-description-input"
        >Launch a targeted marketing campaign for the Jumia Storefront. Focus on increasing brand awareness and driving sales.</textarea>

        <label for="edit-priority">Priority</label>
        <select
          id="edit-priority"
          class="edit-select"
          data-testid="test-todo-edit-priority-select"
        >
          <option value="low">Low</option>
          <option value="medium">Medium</option>
          <option value="high" selected>High</option>
        </select>

        <label for="edit-due-date">Due date</label>
        <input
          type="datetime-local"
          id="edit-due-date"
          class="edit-input"
          data-testid="test-todo-edit-due-date-input"
          value="2026-05-01T18:00"
        />

        <div class="form-actions">
          <button
            type="button"
            class="btn btn-save"
            data-testid="test-todo-save-button"
          >
            Save
          </button>

          <button
            type="button"
            class="btn btn-cancel"
            data-testid="test-todo-cancel-button"
          >
            Cancel
          </button>
        </div>
      </form>

    </article>
</body>

</html>
